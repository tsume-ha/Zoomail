volumes:
  zoomail_database_data_2:

networks:
  database:
    driver: bridge

services:
  django:
    build:
      context: .
      target: develop
    networks:
      - database
    env_file:
      - .env
    environment:
      - DATABASE=mariadb
    depends_on:
      - database
    volumes:
      - ./:/django
    command: "python manage.py runserver 0.0.0.0:8000"
    ports:
      - 8000:8000

  database:
    image: mariadb:11.2.2-jammy
    restart: on-failure
    networks:
      - database
    env_file:
      - .env
    environment:
      - MARIADB_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MARIADB_PASSWORD=${DATABASE_PASSWORD}
      - MARIADB_USER=${DATABASE_USER}
      - MARIADB_DATABASE=${DATABASE_NAME}
      - MARIADB_CHARACTER_SET_SERVER=utf8mb4
      - MARIADB_COLLATION_SERVER=utf8mb4_ja_0900_as_cs
    volumes:
      - zoomail_database_data_2:/var/lib/mysql
      - ./docker/mariadb/initdb:/docker-entrypoint-initdb.d:ro
