{% extends "base.html" %}
{% block main %}
<div class="container my-4">
    <h1>Edit File</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
    <a href="{% url 'others:file_list' %}" class="btn btn-secondary mt-3">Back to List</a>
</div>
{% endblock main %}
