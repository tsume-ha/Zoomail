networks:
  database:
    driver: bridge

services:
  django:
    build:
      context: .
      target: production
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    restart: on-failure
    networks:
      - database
    env_file:
      - .env
    environment:
      - DATABASE=mariadb
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./collected_static:/django/collected_static
      - ./private_media:/django/private_media
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "127.0.0.1:8000:8000"

  database:
    image: mariadb:11.2.2-jammy
    restart: on-failure
    networks:
      - database
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    env_file:
      - .env
    environment:
      - MARIADB_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MARIADB_PASSWORD=${DATABASE_PASSWORD}
      - MARIADB_USER=${DATABASE_USER}
      - MARIADB_DATABASE=${DATABASE_NAME}
      - MARIADB_CHARACTER_SET_SERVER=utf8mb4
      - MARIADB_COLLATION_SERVER=utf8mb4_ja_0900_as_cs_ks
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./mariadb:/var/lib/mysql
