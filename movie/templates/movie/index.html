{% extends "base.html" %}

{% block main %}
<h2 class="fw-bold text-primary mb-4">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clapperboard"><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 4"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>
    ライブ動画
</h2>
<div class="row">
    {% for item in items %}
    <div class="col-12 mb-2">
        <div class="card-body">
            <h3 class="fw-bold text-primary my-2">{{ item.title }}</h3>
            <iframe
                width="100%"
                height="240"
                class="youtube_content"
                src="{{ item.url }}"
                frameborder="0"
                allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
            {% if item.textcontent %}
            <p class="mt-2">{{ item.textcontent }}</p>
            {% endif %}
        </div>
        {% if not forloop.last %}
        <hr>
        {% endif %}
    </div>
    {% endfor %}
</div>
{% endblock %}
