{% extends "base.html" %}
{% load custom_filters %}

{% block main %}
<div class="container">
    <h2 class="fw-bold text-primary mb-4">動画リスト</h2>
    <div class="row">
        {% for item in video_items %}
        <div class="col-12 mb-4">
            <h3>{{ item.title }}</h3>
            <iframe width="100%" height="315" class="youtube_content" src="{{ item.video_url }}" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            {% if item.description %}
            <p class="mt-2">{{ item.description }}</p>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
