{% extends "base.html" %}
{% load static %}


{% block main %}
<h2 class="fw-bold text-primary mb-4">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-image"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
    写真
</h2>
<div class="row">
    {% for item in items %}
        <div class="col-md-4">
            <div class="card mb-4">
                <img src="{% if item.thumbnail %}{{ item.thumbnail.url }}{% else %}{% static 'img/unplugged_logo.jpg' %}{% endif %}" class="card-img-top" alt="{{ item.title }}">
                <div class="card-body">
                    <h5 class="card-title">{{ item.title }}</h5>
                    <p class="card-text">イベント日: {{ item.held_at }}</p>
                    {% if item.url %}
                        <a href="{{ item.url }}" class="btn btn-primary">アルバムを見る</a>
                    {% endif %}
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
